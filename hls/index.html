<!doctype html>
<html>
  <body style="margin: 0; background: #000">
    <video width="275px" height="274px" muted autoplay></video>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
      const video = document.querySelector("video");
      const src =
        "https://live.us.shoplive.cloud/live-p/45-2BKoReceFHHSFDYyb-ue2_480p/playlist.m3u8?preview=1";

      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(src);
        hls.attachMedia(video);
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        // Safari native HLS
        video.src = src;
        video.load();
      }
    </script>
  </body>
</html>
